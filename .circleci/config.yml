version: 2.1

jobs:
  test:
    parameters:
      executor:
        type: executor
    executor: << parameters.executor >>
    steps:
      - checkout
      - node/install:
          node-version: '24'
      - when:
          condition:
            matches:
              pattern: "^linux.*"
              value: << parameters.executor >>
          steps:
            - run:
                name: Enable linger for current user (Linux only)
                command: loginctl enable-linger $(whoami)
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Run tests
          command: npm run test -- ./test --no-file-parallelism --disable-console-intercept
          no_output_timeout: 30m

orbs:
  node: circleci/node@6

executors:
  linux-x86:
    machine:
      image: ubuntu-2404:current
    resource_class: medium
  linux-arm:
    machine:
      image: ubuntu-2404:current
    resource_class: arm.medium
  macos:
    macos:
      xcode: '16.2.0'
    resource_class: macos.m1.medium.gen1

workflows:
  test-all:
    jobs:
      - test:
          matrix:
            parameters:
              executor: [linux-x86, linux-arm, macos]
