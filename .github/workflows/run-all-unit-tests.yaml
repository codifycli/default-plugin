# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Test all on Demand

on:
  push:
#  schedule:
#    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
#        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
      - name: Enable linger for admin user (Linux only)
        if: runner.os == 'Linux'
        run: loginctl enable-linger $(whoami)
      - run: npm ci
      - run: npx tsx scripts/cleanup-github-actions.ts
#
#      - name: Setup tmate session
#        uses: mxschmitt/action-tmate@v3

      - run: npm run test -- ./test --no-file-parallelism --disable-console-intercept
